events { }
http {
    server_tokens off;

    add_header X-Content-Type-Options nosniff;

    limit_req_zone $binary_remote_addr zone=one:10m rate=60r/s;

    server {
        listen 80;

        location / {
            root      /usr/share/nginx/html;
            try_files $uri $uri/ /index.html =404;
            limit_req zone=one burst=60 nodelay;
            gzip_static on;
            add_header Cache-Control "max-age=3600";

            # When available in nginx, uncomment and remove **/*.br from .dockerignore
            # brotli_static on;
        }

        location ~* .woff2?$ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        location ^~ /_framework/ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        location = /index.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        location = /_framework/blazor.boot.json {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }
    }

    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js mjs;
        application/json                      json;
        application/manifest+json             webmanifest;
        application/wasm                      wasm;
        text/plain                            txt;
        text/xml                              xml;
        application/octet-stream              bin dll exe pdb blat dat webcil;

        # Images
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/gif                             gif;
        image/webp                            webp;
        image/avif                            avif;
        image/svg+xml                         svg;
        image/x-icon                          ico;

        # Fonts
        font/woff                             woff;
        font/woff2                            woff2;

        # Fallback (optional – nginx `default_type` can cover this)
        application/octet-stream              *;
    }
}
